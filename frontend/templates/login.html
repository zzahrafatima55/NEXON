<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Login — Nexon</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="manifest" href="/static/manifest.json">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--black);
      position: relative;
      overflow: hidden;
    }

    .auth-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(229,9,20,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(229,9,20,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .auth-card {
      background: rgba(17,17,17,0.95);
      border: 1px solid rgba(229,9,20,0.15);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--red), transparent);
      border-radius: 20px 20px 0 0;
    }

    .auth-logo {
      font-family: var(--font-title);
      font-size: 36px;
      letter-spacing: 4px;
      color: var(--red);
      text-shadow: 0 0 30px rgba(229,9,20,0.4);
      margin-bottom: 8px;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      transition: var(--transition);
      width: 100%;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--red);
      background: rgba(229,9,20,0.06);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.1);
    }

    .form-input::placeholder { color: rgba(255,255,255,0.2); }

    .auth-btn {
      background: var(--red);
      color: white;
      font-weight: 700;
      font-size: 14px;
      padding: 14px;
      border-radius: 10px;
      width: 100%;
      transition: var(--transition);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .auth-btn:hover { background: var(--red-dim); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(229,9,20,0.3); }
    .auth-btn:active { transform: translateY(0); }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }

    .auth-divider-line { flex: 1; height: 1px; background: var(--border); }
    .auth-divider-text { font-size: 12px; color: var(--text-muted); }

    .google-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      padding: 13px;
      border-radius: 10px;
      width: 100%;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .google-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    .auth-error {
      background: rgba(229,9,20,0.1);
      border: 1px solid rgba(229,9,20,0.3);
      color: #ff6b6b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .auth-footer a { color: var(--red); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo">NEXON</div>
      <div class="auth-subtitle">Sign in to your account</div>

      {% if error %}
      <div class="auth-error" style="margin-bottom:16px;">{{ error }}</div>
      {% endif %}

      <div class="auth-form">
        <form method="POST" action="/login">
          <div class="auth-form">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input class="form-input" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button class="auth-btn" type="submit">Sign In</button>
          </div>
        </form>

        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <div class="auth-divider-text">or</div>
          <div class="auth-divider-line"></div>
        </div>

        <a href="/auth/google" class="google-btn">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </a>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Sign up</a>
      </div>
    </div>
  </div>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
  }
</script>
</body>
</html>
